<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tecnologías móviles</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="contenedor">
    <h1>Tecnologías Móviles</h1>

    <div class="tarjetas">

      <div class="tarjeta">
        <h2>2G</h2>
        <p>Año: 1991</p>
        <p>Velocidad: Muy baja</p>
        <p>Aplicaciones: Llamadas y SMS</p>
      </div>

      <div class="tarjeta">
        <h2>3G</h2>
        <p>Año: 2001</p>
        <p>Velocidad: Media</p>
        <p>Aplicaciones: Internet móvil</p>
      </div>

      <div class="tarjeta">
        <h2>4G</h2>
        <p>Año: 2009</p>
        <p>Velocidad: Alta</p>
        <p>Aplicaciones: Streaming</p>
      </div>

      <div class="tarjeta">
        <h2>5G</h2>
        <p>Año: 2019</p>
        <p>Velocidad: Muy alta</p>
        <p>Aplicaciones: IoT, baja latencia</p>
      </div>

    </div>
  </div>

</body>
</html>
