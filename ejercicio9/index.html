        <div class="texto">
            <h1>Internet por Fibra Óptica</h1>
            <p>
                La fibra óptica permite transmitir datos mediante pulsos de luz,
                ofreciendo mayor velocidad y estabilidad que las tecnologías tradicionales.
            </p>
            <p>
                Es ideal para streaming, videollamadas, juegos en línea y aplicaciones
