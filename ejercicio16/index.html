<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa de Red Empresarial</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="contenedor">
    <h1>Mapa Visual de una Red Empresarial</h1>

    <div class="nodo internet">Internet</div>
    <div class="linea"></div>

    <div class="nodo router">Router</div>
    <div class="linea"></div>

    <div class="nodo firewall">Firewall</div>
    <div class="linea"></div>

    <div class="nodo switch">Switch</div>
    <div class="linea"></div>

    <div class="linea-horizontal"></div>

    <div class="fila">
      <div class="rama">
        <div class="linea-vertical"></div>
        <div class="nodo servidor">Servidor</div>
      </div>

      <div class="rama">
        <div class="linea-vertical"></div>
        <div class="nodo pc">PC 1</div>
      </div>

      <div class="rama">
        <div class="linea-vertical"></div>
        <div class="nodo pc">PC 2</div>
      </div>

      <div class="rama">
        <div class="linea-vertical"></div>
        <div class="nodo ap">Access Point</div>
      </div>
    </div>
  </div>
</body>
</html>
