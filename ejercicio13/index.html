<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Topologías de Red</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Topologías de Red</h1>

<div class="contenedor">
    <div class="topologia">
        <h2>Estrella</h2>
        <p>Todos los dispositivos se conectan a un nodo central.</p>
    </div>

    <div class="topologia">
        <h2>Bus</h2>
        <p>Todos los dispositivos comparten un mismo canal.</p>
    </div>

    <div class="topologia">
        <h2>Anillo</h2>
        <p>Los dispositivos se conectan formando un círculo.</p>
    </div>

    <div class="topologia">
        <h2>Malla</h2>
        <p>Cada dispositivo se conecta con varios otros.</p>
    </div>
</div>

</body>
</html>
